<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="LecturePulse">
  <rect width="32" height="32" rx="8" fill="#0a0a0a"/>
  <circle cx="16" cy="16" r="14" fill="rgba(212,168,83,0.12)"/>
  <defs>
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="50%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#fff2b3"/>
    </linearGradient>
    <filter id="pulse-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path
    d="M3 16 H7 L9 8 L11 24 L13 6 L15 18 L17 12 L19 22 L21 14 L23 16 L29 16"
    stroke="url(#pulse-grad)"
    stroke-width="2.25"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#pulse-glow)"
  />
  <path
    d="M13 6 L15 18 L17 12"
    stroke="#fff2b3"
    stroke-width="1"
    fill="none"
    stroke-linecap="round"
    opacity="0.55"
  />
</svg>
